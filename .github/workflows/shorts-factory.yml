name: Shorts Factory v2 Pipeline

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to process'
        required: true
        type: string
      hf_token:
        description: 'HuggingFace token for speaker diarization (optional)'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'

env:
  PYTHON_VERSION: '3.12'

jobs:
  process-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p downloads clips captions output logs

      - name: Ensure fonts are present
        run: |
          if [ ! -f assets/fonts/Montserrat-ExtraBold.ttf ]; then
            mkdir -p assets/fonts
            curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -o assets/fonts/Montserrat-Bold.ttf
            curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" -o assets/fonts/Montserrat-ExtraBold.ttf
          fi

      - name: Inject HuggingFace token if provided
        if: ${{ github.event.inputs.hf_token != '' }}
        run: |
          python -c "
          import json
          with open('config.json') as f: c = json.load(f)
          c['hf_token'] = '${{ github.event.inputs.hf_token }}'
          with open('config.json', 'w') as f: json.dump(c, f, indent=2)
          print('HF token injected into config.json')
          "

      - name: Verify dependencies
        run: python main.py --check

      - name: Pre-download Whisper model
        run: |
          python -c "import whisper; whisper.load_model('base'); print('Whisper cached')"

      - name: Run Shorts Factory v2 Pipeline
        env:
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
        run: |
          if [ -z "$YOUTUBE_URL" ]; then
            echo "No YouTube URL provided. Skipping."
            exit 0
          fi
          python main.py --ci "$YOUTUBE_URL"

      - name: Upload shorts as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shorts-output
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 3

      - name: Cleanup
        if: always()
        run: rm -rf downloads/ clips/ captions/