name: Shorts Factory Pipeline

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to process'
        required: true
        type: string
  schedule:
    - cron: '0 0 * * *'  # Can be enabled for daily runs

env:
  PYTHON_VERSION: '3.12'

jobs:
  process-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ───────────────────────────────
      - name: Install FFmpeg and system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      # ── Python setup ──────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Create runtime directories ────────────────────────
      - name: Create output directories
        run: mkdir -p downloads clips captions output logs

      # ── Download fonts (if not committed) ─────────────────
      - name: Ensure fonts are present
        run: |
          if [ ! -f assets/fonts/Montserrat-ExtraBold.ttf ]; then
            mkdir -p assets/fonts
            curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -o assets/fonts/Montserrat-Bold.ttf
            curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" -o assets/fonts/Montserrat-ExtraBold.ttf
          fi
          ls -la assets/fonts/

      # ── Dependency check ──────────────────────────────────
      - name: Verify dependencies
        run: python main.py --check

      # ── Download Whisper model (cache for future runs) ────
      - name: Pre-download Whisper model
        run: |
          python -c "import whisper; whisper.load_model('base'); print('Whisper base model cached')"

      # ── Run the pipeline ──────────────────────────────────
      - name: Run Shorts Factory Pipeline
        env:
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
        run: |
          if [ -z "$YOUTUBE_URL" ]; then
            echo "No YouTube URL provided. Skipping."
            exit 0
          fi
          python main.py --ci "$YOUTUBE_URL"

      # ── Upload outputs as artifacts ───────────────────────
      - name: Upload shorts as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shorts-output
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: warn

      # ── Upload logs as artifacts ──────────────────────────
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 3

      # ── Cleanup (save disk space) ─────────────────────────
      - name: Cleanup working directory
        if: always()
        run: |
          rm -rf downloads/ clips/ captions/
          echo "Cleanup complete"